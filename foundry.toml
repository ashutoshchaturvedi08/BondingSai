[profile.default]
src = "contracts"
out = "forge-out"
libs = ["node_modules", "lib"]
test = "test/foundry"
cache_path = "forge-cache"
solc_version = "0.8.28"
evm_version = "paris"
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "@chainlink/=node_modules/@chainlink/",
    "forge-std/=node_modules/forge-std/src/",
]

[fuzz]
runs = 256
