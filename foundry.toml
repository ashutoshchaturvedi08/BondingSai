[profile.default]
src = "contracts"
out = "forge-out"
libs = ["node_modules", "lib"]
solc_version = "0.8.28"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
via_ir = true

# Remappings — resolve imports to node_modules
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "@chainlink/=node_modules/@chainlink/",
]

[profile.default.fuzz]
runs = 512
max_test_rejects = 65536

[profile.default.invariant]
runs = 128
depth = 40
fail_on_revert = false
